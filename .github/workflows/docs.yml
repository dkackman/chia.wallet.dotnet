name: Publish Docs

on:
  workflow_dispatch:
    inputs:
      sdk_ref:
        description: 'chia-wallet-sdk branch or tag to build docs from'
        required: false
        default: 'main'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout chia.wallet.dotnet
        uses: actions/checkout@v4
        with:
          path: chia.wallet.dotnet

      - name: Checkout chia-wallet-sdk
        uses: actions/checkout@v4
        with:
          repository: dkackman/chia-wallet-sdk
          ref: ${{ inputs.sdk_ref }}
          path: chia-wallet-sdk

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install DocFX
        run: dotnet tool install -g docfx

      # Building the SDK project runs MSBuild targets that patch the generated
      # source (visibility promotion, string disambiguation). The patched file
      # is then copied into the docs project for DocFX metadata extraction.
      - name: Build SDK to get patched source
        run: dotnet build chia-wallet-sdk/uniffi/cs/ChiaWalletSdk.csproj -c Release

      - name: Copy patched source into docs project
        run: cp chia-wallet-sdk/uniffi/cs/chia_wallet_sdk.cs chia.wallet.dotnet/docs/docfx/

      - name: Generate docs
        run: docfx chia.wallet.dotnet/docs/docfx/docfx.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: chia.wallet.dotnet/docs/docfx/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
